# ─────────────────────────────────────────────
# SCHEMAS
# ─────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    NextCode:
      type: object
      properties:
        nextCode:
          type: integer
        lastCode:
          type: integer
      required: [nextCode, lastCode]

    # ── Dashboard ──
    DashboardStats:
      type: object
      properties:
        todayAppointments:
          type: integer
        newPatientsToday:
          type: integer
        totalPatients:
          type: integer
        todayRevenue:
          type: number
        totalVisits:
          type: integer
        totalAppointments:
          type: integer
      required: [todayAppointments, newPatientsToday, totalPatients, todayRevenue, totalVisits, totalAppointments]

    DailyFunnel:
      type: object
      properties:
        waitingArrival:
          type: integer
        inReception:
          type: integer
        inExamination:
          type: integer
        completed:
          type: integer
        postponed:
          type: integer
        noShow:
          type: integer
        sessionDone:
          type: integer
      required: [waitingArrival, inReception, inExamination, completed, postponed, noShow, sessionDone]

    # ── Patient ──
    PhoneNumber:
      type: object
      properties:
        number:
          type: string
        owner:
          type: string
      required: [number]

    Patient:
      type: object
      properties:
        id:
          type: integer
        localCode:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: ["string", "null"]
        gender:
          type: string
          enum: [male, female]
        dateOfBirth:
          type: ["string", "null"]
        ageYears:
          type: ["integer", "null"]
        ageMonths:
          type: ["integer", "null"]
        ageDays:
          type: ["integer", "null"]
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumber"
        homePhone:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        governorate:
          type: ["string", "null"]
        birthPlace:
          type: ["string", "null"]
        occupation:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        insuranceStatus:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        isDeleted:
          type: boolean
        totalVisits:
          type: integer
        lastVisitDate:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, localCode, nameAr, gender, isDeleted, totalVisits, createdAt]

    PatientInput:
      type: object
      properties:
        localCode:
          type: ["integer", "null"]
        nameAr:
          type: string
        nameEn:
          type: ["string", "null"]
        gender:
          type: string
          enum: [male, female]
        dateOfBirth:
          type: ["string", "null"]
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumber"
        homePhone:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        governorate:
          type: ["string", "null"]
        birthPlace:
          type: ["string", "null"]
        occupation:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        insuranceStatus:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
      required: [nameAr, gender]

    PatientUpdate:
      type: object
      properties:
        nameAr:
          type: ["string", "null"]
        nameEn:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        phones:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/PhoneNumber"
        homePhone:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        governorate:
          type: ["string", "null"]
        birthPlace:
          type: ["string", "null"]
        occupation:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        insuranceStatus:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]

    PatientList:
      type: object
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [patients, total, page, limit]

    Visit:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        appointmentId:
          type: ["integer", "null"]
        date:
          type: string
        services:
          type: array
          items:
            type: string
        diagnosis:
          type: ["string", "null"]
        totalFee:
          type: number
        paidAmount:
          type: number
        remainingAmount:
          type: number
        notes:
          type: ["string", "null"]
      required: [id, patientId, date, totalFee, paidAmount, remainingAmount]

    # ── Appointment ──
    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientNameAr:
          type: string
        patientCode:
          type: integer
        branch:
          type: string
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        status:
          type: string
          enum: [waiting_arrival, in_reception, in_examination, completed, session_done, postponed, no_show, cancelled]
        source:
          type: string
          enum: [walk_in, phone, social_media, website, email]
        paymentMethod:
          type: string
          enum: [cash, credit_card, check, bank_transfer, postal_transfer]
        serviceIds:
          type: array
          items:
            type: integer
        serviceNames:
          type: array
          items:
            type: string
        doctorId:
          type: ["integer", "null"]
        doctorName:
          type: ["string", "null"]
        totalFee:
          type: number
        paidAmount:
          type: number
        remainingAmount:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, patientId, patientNameAr, patientCode, branch, appointmentDate, appointmentTime, status, source, paymentMethod, totalFee, paidAmount, remainingAmount, createdAt]

    AppointmentInput:
      type: object
      properties:
        patientId:
          type: integer
        branch:
          type: string
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        source:
          type: string
          enum: [walk_in, phone, social_media, website, email]
        paymentMethod:
          type: string
          enum: [cash, credit_card, check, bank_transfer, postal_transfer]
        serviceIds:
          type: array
          items:
            type: integer
        doctorId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
      required: [patientId, branch, appointmentDate, appointmentTime, source, paymentMethod]

    AppointmentUpdate:
      type: object
      properties:
        appointmentDate:
          type: ["string", "null"]
        appointmentTime:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        serviceIds:
          type: ["array", "null"]
          items:
            type: integer
        doctorId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    AppointmentList:
      type: object
      properties:
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [appointments, total, page, limit]

    StatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [waiting_arrival, in_reception, in_examination, completed, session_done, postponed, no_show, cancelled]
      required: [status]

    Payment:
      type: object
      properties:
        id:
          type: integer
        appointmentId:
          type: integer
        amount:
          type: number
        paymentMethod:
          type: string
        note:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, appointmentId, amount, paymentMethod, createdAt]

    PaymentInput:
      type: object
      properties:
        amount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, credit_card, check, bank_transfer, postal_transfer]
        note:
          type: ["string", "null"]
      required: [amount, paymentMethod]

    # ── Financial ──
    FinancialSummary:
      type: object
      properties:
        totalPayments:
          type: number
        totalReceivables:
          type: number
        totalDiscounts:
          type: number
        totalServicePrice:
          type: number
        totalPatients:
          type: integer
        totalServices:
          type: integer
        netProfit:
          type: number
        totalExpenses:
          type: number
        cashPayments:
          type: number
        otherPayments:
          type: number
      required: [totalPayments, totalReceivables, totalDiscounts, totalServicePrice, totalPatients, totalServices, netProfit, totalExpenses, cashPayments, otherPayments]

    Receivable:
      type: object
      properties:
        patientId:
          type: integer
        patientName:
          type: string
        patientPhone:
          type: ["string", "null"]
        appointmentId:
          type: integer
        appointmentDate:
          type: string
        amount:
          type: number
      required: [patientId, patientName, appointmentId, appointmentDate, amount]

    Vault:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        balance:
          type: number
        isLocked:
          type: boolean
        createdAt:
          type: string
      required: [id, name, balance, isLocked, createdAt]

    VaultTransaction:
      type: object
      properties:
        id:
          type: integer
        vaultId:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, transfer_in, transfer_out]
        amount:
          type: number
        note:
          type: ["string", "null"]
        performedBy:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, vaultId, type, amount, createdAt]

    VaultTransactionInput:
      type: object
      properties:
        type:
          type: string
          enum: [deposit, withdrawal, transfer_in, transfer_out]
        amount:
          type: number
        targetVaultId:
          type: ["integer", "null"]
        note:
          type: ["string", "null"]
      required: [type, amount]

    Expense:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        amount:
          type: number
        vaultId:
          type: integer
        vaultName:
          type: string
        performedBy:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        receiptUrl:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, categoryId, categoryName, amount, vaultId, vaultName, createdAt]

    ExpenseInput:
      type: object
      properties:
        categoryId:
          type: integer
        amount:
          type: number
        vaultId:
          type: integer
        performedBy:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        receiptUrl:
          type: ["string", "null"]
      required: [categoryId, amount, vaultId]

    ExpenseCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
      required: [id, name]

    ExpenseCategoryInput:
