openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Clinic Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard statistics
  - name: patients
    description: Patient management
  - name: appointments
    description: Appointment booking and queue
  - name: financial
    description: Financial management
  - name: services
    description: Medical services and pricing
  - name: inventory
    description: Inventory management
  - name: analytics
    description: Analytics and insights
  - name: templates
    description: Medical templates
  - name: users
    description: Users and roles
  - name: settings
    description: System settings
  - name: staff
    description: Staff and doctor management
  - name: tasks
    description: Internal notes and tasks

paths:
  # ─────────────────────────────────────────────
  # STAFF
  # ─────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members with HR details
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaffDetails
      tags: [staff]
      summary: Create or update staff HR details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffDetailsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    patch:
      operationId: updateStaffDetails
      tags: [staff]
      summary: Update staff HR details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffDetailsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  # ─────────────────────────────────────────────
  # TASKS
  # ─────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks/notes
      parameters:
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
        - name: isCompleted
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task or note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─────────────────────────────────────────────
  # DASHBOARD
  # ─────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get today's dashboard statistics
      parameters:
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/funnel:
    get:
      operationId: getDailyFunnel
      tags: [dashboard]
      summary: Get daily appointment status funnel
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Funnel data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFunnel"

  # ─────────────────────────────────────────────
  # PATIENTS
  # ─────────────────────────────────────────────
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all active patients
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: gender
          in: query
          schema:
            type: ["string", "null"]
        - name: ageFrom
          in: query
          schema:
            type: ["integer", "null"]
        - name: ageTo
          in: query
          schema:
            type: ["integer", "null"]
        - name: maritalStatus
          in: query
          schema:
            type: ["string", "null"]
        - name: nationality
          in: query
          schema:
            type: ["string", "null"]
        - name: address
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Patients list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Register a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/deleted:
    get:
      operationId: listDeletedPatients
      tags: [patients]
      summary: List soft-deleted patients
      responses:
        "200":
          description: Deleted patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"

  /patients/next-code:
    get:
      operationId: getNextPatientCode
      tags: [patients]
      summary: Get the next available patient local code
      responses:
        "200":
          description: Next code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextCode"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Soft delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /patients/{id}/restore:
    post:
      operationId: restorePatient
      tags: [patients]
      summary: Restore a soft-deleted patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}/permanent-delete:
    delete:
      operationId: permanentDeletePatient
      tags: [patients]
      summary: Permanently delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Permanently deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /patients/{id}/visits:
    get:
      operationId: getPatientVisits
      tags: [patients]
      summary: Get visit history for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visit history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Visit"

  # ─────────────────────────────────────────────
  # APPOINTMENTS
  # ─────────────────────────────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments with filters
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: doctorId
          in: query
          schema:
            type: ["integer", "null"]
        - name: serviceId
          in: query
          schema:
            type: ["integer", "null"]
        - name: insuranceGroupId
          in: query
          schema:
            type: ["integer", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Appointments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: cancelAppointment
      tags: [appointments]
      summary: Cancel an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /appointments/{id}/status:
    patch:
      operationId: updateAppointmentStatus
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}/payment:
    post:
      operationId: recordAppointmentPayment
      tags: [appointments]
      summary: Record a payment for an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ─────────────────────────────────────────────
  # FINANCIAL
  # ─────────────────────────────────────────────
  /financial/summary:
    get:
      operationId: getFinancialSummary
      tags: [financial]
      summary: Get financial KPI summary
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /financial/receivables:
    get:
      operationId: listReceivables
      tags: [financial]
      summary: List outstanding receivables
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Receivables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receivable"

  /financial/vaults:
    get:
      operationId: listVaults
      tags: [financial]
      summary: List all vaults with balances
      responses:
        "200":
          description: Vaults
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vault"

  /financial/vaults/{id}/transactions:
    get:
      operationId: listVaultTransactions
      tags: [financial]
      summary: Get vault transaction history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultTransaction"
    post:
      operationId: createVaultTransaction
      tags: [financial]
      summary: Create a vault transaction (deposit/withdraw/transfer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultTransactionInput"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultTransaction"

  /financial/expenses:
    get:
      operationId: listExpenses
      tags: [financial]
      summary: List expenses
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [financial]
      summary: Record a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /financial/expense-categories:
    get:
      operationId: listExpenseCategories
      tags: [financial]
      summary: List expense categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseCategory"
    post:
      operationId: createExpenseCategory
      tags: [financial]
      summary: Create expense category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCategory"

  /financial/expense-categories/{id}:
    patch:
      operationId: updateExpenseCategory
      tags: [financial]
      summary: Update expense category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCategory"
    delete:
      operationId: deleteExpenseCategory
      tags: [financial]
      summary: Delete expense category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /financial/routine-expenses:
    get:
      operationId: listRoutineExpenses
      tags: [financial]
      summary: List routine expenses
      responses:
        "200":
          description: Routine expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutineExpense"
    post:
      operationId: createRoutineExpense
      tags: [financial]
      summary: Create routine expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineExpense"

  /financial/routine-expenses/{id}:
    patch:
      operationId: updateRoutineExpense
      tags: [financial]
      summary: Update routine expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineExpenseInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineExpense"
    delete:
      operationId: deleteRoutineExpense
      tags: [financial]
      summary: Delete routine expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings/working-days:
    get:
      operationId: listWorkingDays
      tags: [settings]
      summary: List working days
      responses:
        "200":
          description: Working days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkingDay"
    put:
      operationId: upsertWorkingDays
      tags: [settings]
      summary: Upsert working days (bulk)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/WorkingDayInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkingDay"

  /settings/holidays:
    get:
      operationId: listHolidays
      tags: [settings]
      summary: List holidays
      responses:
        "200":
          description: Holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"
    post:
      operationId: createHoliday
      tags: [settings]
      summary: Add holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HolidayInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"

  /settings/holidays/{id}:
    delete:
      operationId: deleteHoliday
      tags: [settings]
      summary: Delete holiday
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─────────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List medical services
      parameters:
        - name: branch
          in: query
          schema:
            type: ["string", "null"]
        - name: groupId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /service-groups:
    get:
      operationId: listServiceGroups
      tags: [services]
      summary: List service groups / insurance templates
      responses:
        "200":
          description: Service groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceGroup"
    post:
      operationId: createServiceGroup
      tags: [services]
      summary: Create a service group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceGroup"

  # ─────────────────────────────────────────────
  # INVENTORY
  # ─────────────────────────────────────────────
  /inventory/items:
    get:
      operationId: listInventoryItems
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: branch
          in: query
          schema:
