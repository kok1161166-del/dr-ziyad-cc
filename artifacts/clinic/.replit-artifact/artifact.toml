kind = "web"
previewPath = "/"
title = "العيادة - Clinic Management System"
version = "1.0.0"
id = "artifacts/clinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20964

[services.development]
run = "pnpm --filter @workspace/clinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clinic", "run", "build" ]
publicDir = "artifacts/clinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20964"
BASE_PATH = "/"
